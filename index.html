<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>那須高原周辺 スーパー・道の駅マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #2d6a35;
      --bg:     #f5f3ef;
      --white:  #ffffff;
      --text:   #222222;
      --muted:  #777777;
      --border: #e2e2e2;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── HEADER ───────────────────────────────── */
    .header {
      background: var(--green);
      color: #fff;
      padding: 14px 16px 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.22);
      z-index: 1000;
      /* sticky on mobile */
      position: sticky;
      top: 0;
    }
    .header h1 { font-size: 1.08rem; font-weight: 700; letter-spacing: .03em; }
    .header p  { font-size: .76rem; opacity: .85; margin-top: 3px; }

    /* ── MAIN LAYOUT ── mobile: stacked ─────── */
    .main-layout {
      display: flex;
      flex-direction: column;
    }

    /* mobile: map on top, list below */
    .map-col { order: 1; }
    .sidebar  { order: 2; }

    /* ── MAP ──────────────────────────────────── */
    #map {
      height: 45vh;
      min-height: 220px;
      width: 100%;
      z-index: 1;
    }

    /* ── LIST HEADER ──────────────────────────── */
    .list-header {
      padding: 10px 16px 6px;
      font-size: .74rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* ── CARDS ────────────────────────────────── */
    .places-list { padding: 10px 12px 16px; }

    .store-card {
      background: var(--white);
      border-radius: 12px;
      padding: 14px 15px;
      margin-bottom: 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,.07);
      cursor: pointer;
      border-left: 4px solid #ccc;
      transition: box-shadow .15s, transform .13s;
    }
    .store-card:hover  { box-shadow: 0 3px 12px rgba(0,0,0,.12); }
    .store-card:active { transform: scale(.98); }
    .store-card.is-active {
      box-shadow: 0 0 0 2px var(--green), 0 3px 12px rgba(0,0,0,.12);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      line-height: 1.3;
      flex: 1;
    }
    .dist-badge {
      flex-shrink: 0;
      font-size: .7rem;
      font-weight: 600;
      background: #f0f7ee;
      color: var(--green);
      border: 1px solid #c2dfc0;
      border-radius: 10px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .chain-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: .72rem;
      font-weight: 600;
      margin-bottom: 7px;
      color: #fff;
    }

    .card-desc {
      font-size: .84rem;
      color: #444;
      line-height: 1.58;
      margin-bottom: 8px;
    }

    .card-meta {
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .meta-row { display: flex; align-items: baseline; gap: 5px; }
    .meta-icon { flex-shrink: 0; }

    /* ── MAP POPUP ────────────────────────────── */
    .leaflet-popup-content-wrapper { border-radius: 10px; font-family: inherit; }
    .leaflet-popup-content { min-width: 200px; }
    .popup-title { font-weight: 700; font-size: .95rem; margin-bottom: 4px; }
    .popup-sub   { font-size: .78rem; color: #555; line-height: 1.6; margin-bottom: 10px; }
    .gmaps-btn {
      display: block;
      background: #4285f4;
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-size: .88rem;
      font-weight: 700;
      padding: 11px 14px;
      border-radius: 8px;
      letter-spacing: .02em;
    }
    .gmaps-btn:hover { background: #3367d6; }

    /* ── FOOTER ───────────────────────────────── */
    footer {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 14px 16px 28px;
      text-align: center;
    }
    .footer-note { font-size: .72rem; color: var(--muted); line-height: 1.65; }

    /* ── DESKTOP: SIDE-BY-SIDE ────────────────── */
    @media (min-width: 768px) {
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .header {
        position: static; /* body handles layout; no scroll to stick against */
      }

      .main-layout {
        flex: 1;
        flex-direction: row;
        min-height: 0; /* allow flex child to shrink below content size */
        overflow: hidden;
      }

      /* list on the LEFT */
      .sidebar {
        order: 1;
        width: 380px;
        min-width: 260px;
        flex-shrink: 0;
        overflow-y: auto;
        border-right: 1px solid var(--border);
        background: var(--bg);
      }

      /* map on the RIGHT */
      .map-col {
        order: 2;
        flex: 1;
        min-width: 0;
        position: relative;
      }

      #map {
        position: absolute;
        inset: 0;          /* top/right/bottom/left: 0 — fills map-col exactly */
        height: 100%;
        min-height: unset;
      }

      /* sticky list-header scrolls with sidebar on desktop */
      .list-header {
        position: sticky;
        top: 0;
      }
    }
  </style>
</head>
<body>

<!-- ─── HEADER ──────────────────────────────── -->
<header class="header">

</header>

<div class="main-layout">

  <!-- ─── SIDEBAR (left on desktop, below map on mobile) ─── -->

    <div class="list-header">距離順（那須高原エリアから）</div>

        ※ 座標データは NAVITIME・栃ナビ等の公開情報をもとにしています。
      </p>
    </footer>
  </aside>

  <!-- ─── MAP (right on desktop, above list on mobile) ───── -->
  <div class="map-col">
    <div id="map"></div>
  </div>

</div>

    lat: 36.808685, lng: 139.937896,
  },
];

/* ── 地図初期化 ──────────────────────────────── */
const map = L.map('map').setView([36.97, 140.025], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
  maxZoom: 18,
}).addTo(map);

/* レイアウト確定後にマップサイズを再計算 */
window.addEventListener('load', () => map.invalidateSize());

function makeIcon(color, emoji = '🛒') {
  return L.divIcon({
    html: `<div style="
      background:${color};color:#fff;border-radius:50%;
      width:32px;height:32px;display:flex;align-items:center;justify-content:center;
      font-size:15px;border:2.5px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.3);
    ">${emoji}</div>`,
    className: '',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
  });
}

const markerMap = {};
STORES.forEach(s => {
  const m = L.marker([s.lat, s.lng], { icon: makeIcon(s.chainColor, s.emoji || '🛒') })
    .addTo(map)
    .bindPopup(`
      <div class="popup-title">${s.name}</div>
      <div class="popup-sub">
        🕐 ${s.hours}<br>
        📍 ${s.address}<br>
        🚗 駐車場 ${s.parking}<br>
        📞 ${s.tel}
      </div>
      <a class="gmaps-btn" href="https://maps.google.com/?q=${s.lat},${s.lng}" target="_blank" rel="noopener">
        🗺️ Googleマップで開く
      </a>
    `);
  markerMap[s.id] = m;
});

/* ── カード描画 ──────────────────────────────── */
const listEl = document.getElementById('places-list');

STORES.forEach(s => {
  const card = document.createElement('div');
  card.className = 'store-card';
  card.style.borderLeftColor = s.chainColor;
  card.innerHTML = `
    <div class="card-top">
      <div class="card-name">${s.name}</div>
      <span class="dist-badge">📍 ${s.dist}</span>
    </div>
    <span class="chain-badge" style="background:${s.chainColor};">${s.chain}</span>
    <p class="card-desc">${s.desc}</p>
    <div class="card-meta">
      <div class="meta-row"><span class="meta-icon">🕐</span><span>${s.hours}</span></div>
      <div class="meta-row"><span class="meta-icon">🚗</span><span>駐車場 ${s.parking}</span></div>
      <div class="meta-row"><span class="meta-icon">📍</span><span>${s.address}</span></div>
      <div class="meta-row"><span class="meta-icon">📞</span><span>${s.tel}</span></div>
    </div>
  `;

  card.addEventListener('click', () => {
    /* アクティブカードをハイライト */
    document.querySelectorAll('.store-card').forEach(c => c.classList.remove('is-active'));
    card.classList.add('is-active');

    const isDesktop = window.innerWidth >= 768;
    if (isDesktop) {
      /* デスクトップ: 地図は常に見えているのでそのままパン */
      map.setView([s.lat, s.lng], 15, { animate: true });
      markerMap[s.id].openPopup();
    } else {
      /* モバイル: 先にページトップへスクロール → 地図をパン */
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => {
        map.setView([s.lat, s.lng], 15, { animate: true });
        markerMap[s.id].openPopup();
      }, 250);
    }
  });

  listEl.appendChild(card);
});
</script>
</body>
</html>
